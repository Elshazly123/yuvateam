        <div class="field"><label for="appoint-user">اسم المستخدم</label><input id="appoint-user" type="text" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="اسم مستخدم موجود بالفعل"></div>
        <div style="display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px;">
          ${PERMISSION_DEFS.map(p => `
            <label style="display:flex; align-items:center; gap:6px; font-size:12.5px; background:#fff; padding:8px 12px; border-radius:8px; border:1.5px solid var(--panel-line); max-width:260px;">
              <input type="checkbox" class="appoint-perm" data-perm="${p.key}" checked> ${p.label}
            </label>
          `).join('')}
        </div>
        <button class="primary-btn" id="appoint-btn" style="width:auto; padding:12px 24px;">تعيين كمدير</button>

        <h3 style="font-size:15px; margin:24px 0 10px;">المديرون الحاليون</h3>
        <table>
          <thead><tr><th>الاسم</th><th>اسم المستخدم</th><th>الصلاحيات</th><th></th></tr></thead>
          <tbody>
            ${managers.length === 0 ? `<tr><td colspan="4" class="empty-row">مفيش مديرين</td></tr>` :
              managers.map(m => {
                const mPerms = m.permissions ? m.permissions : FULL_PERMS;
                const grantedCount = PERMISSION_DEFS.filter(p => mPerms[p.key]).length;
                const isSelf = m.id === currentUser.id;
                return `
                <tr>
                  <td>${m.name}${isSelf ? ' (إنت)' : ''}</td>
                  <td class="mono">${m.username}</td>
                  <td style="font-size:12px; color:var(--text-mute);">${m.permissions ? `${grantedCount} / ${PERMISSION_DEFS.length} صلاحية` : 'كل الصلاحيات (مدير أساسي)'}</td>
                  <td style="white-space:nowrap;">
                    ${!isSelf ? `<button class="secondary-btn" style="padding:6px 10px; font-size:12px; width:auto;" data-edit-perms="${m.id}">تعديل الصلاحيات</button>` : `<span class="sub" style="font-size:11px;">محدش غيرك يقدر يعدّل صلاحياتك</span>`}
                    ${!isSelf ? `<button class="secondary-btn" style="padding:6px 10px; font-size:12px; width:auto; color:var(--danger); border-color:rgba(196,69,59,0.4) !important;" data-revoke-mgr="${m.id}">إلغاء صلاحية المدير</button>` : ''}
                  </td>
                </tr>`;
              }).join('')}
          </tbody>
        </table>
      </div>` : ''}
    </div>
  `;

  document.getElementById('back-to-dash').onclick = () => { currentView = 'dashboard'; route(); };
  const backupBtn = document.getElementById('backup-btn');
  if(backupBtn) backupBtn.onclick = exportFullBackup;

  if(perms.manageSettings){
    document.getElementById('save-settings-btn').onclick = async () => {
      const checked = Array.from(app.querySelectorAll('[data-wd]')).filter(c => c.checked).map(c => Number(c.getAttribute('data-wd')));
      if(checked.length === 0){ showToast('لازم يوم شغل واحد على الأقل', true); return; }
      const locEnabled = document.getElementById('set-loc-enabled').checked;
      if(locEnabled && branches.length === 0){
        showToast('لازم تضيف فرع واحد على الأقل تحت قبل ما تفعّل تقييد الموقع', true);
        return;
      }
      const newSettings = {
        workDays: checked,
        currency: document.getElementById('set-currency').value.trim() || 'جنيه',
        deductionPerDay: Number(document.getElementById('set-perday').value) || 0,
        deductionPerLateMinute: Number(document.getElementById('set-permin').value) || 0,
        overtimeRatePerMinute: Number(document.getElementById('set-otrate').value) || 0,
        defaultStartTime: document.getElementById('set-defstart').value || '09:00',
        defaultEndTime: document.getElementById('set-defend').value || '17:00',
        companyName: document.getElementById('set-company').value.trim(),
        logoUrl: document.getElementById('set-logo').value.trim(),
        kioskMode: document.getElementById('set-kiosk').checked,
        verificationMethod: (app.querySelector('input[name="set-verify"]:checked') || {}).value || 'fingerprint',
        qrEnabled: document.getElementById('set-qr-enabled').checked,
        locationEnabled: locEnabled
      };
      try{
        await settingsCol.doc('general').set(newSettings, {merge:true});
        showToast('تم حفظ الإعدادات');
        logAction('تعديل الإعدادات العامة', '');
      }catch(e){
        showToast('حصلت مشكلة أثناء الحفظ', true);
      }
    };

    document.getElementById('capture-loc-btn').onclick = () => {
      const statusEl = document.getElementById('capture-loc-status');
      if(!('geolocation' in navigator)){ statusEl.textContent = 'الموقع غير مدعوم على هذا الجهاز'; return; }
      statusEl.textContent = 'جاري تحديد موقعك...';
      navigator.geolocation.getCurrentPosition(
        pos => {
          document.getElementById('br-lat').value = pos.coords.latitude.toFixed(6);
          document.getElementById('br-lng').value = pos.coords.longitude.toFixed(6);
          statusEl.textContent = '✅ تم تحديد الموقع. اكتب اسم الفرع وحدد النطاق ودوس "إضافة الفرع".';
        },
        () => { statusEl.textContent = 'تعذر الوصول لموقعك. اسمح للمتصفح بالوصول للموقع وجرب تاني.'; },
        {timeout:8000}
      );
    };

    document.getElementById('add-branch-btn').onclick = async () => {
      if(!debounceSubmit()) return;
      const name = document.getElementById('br-name').value.trim();
      const lat = Number(document.getElementById('br-lat').value);
      const lng = Number(document.getElementById('br-lng').value);
      const radiusMeters = Number(document.getElementById('br-radius').value) || 150;
      const errBox = document.getElementById('branch-error');
      if(!name || !document.getElementById('br-lat').value || !document.getElementById('br-lng').value || isNaN(lat) || isNaN(lng)){
        errBox.innerHTML = `<div class="error-msg">اكتب اسم الفرع وحدد إحداثياته (دوس "استخدم موقعي الحالي" وانت واقف هناك)</div>`;
        return;
      }
      try{
        await branchesCol.add({ name, lat, lng, radiusMeters });
        showToast(`تمت إضافة فرع ${name}`);
        logAction('إضافة فرع', name);
        document.getElementById('br-name').value = '';
        document.getElementById('br-lat').value = '';
        document.getElementById('br-lng').value = '';
        document.getElementById('capture-loc-status').textContent = '';
      }catch(e){ errBox.innerHTML = `<div class="error-msg">حصلت مشكلة أثناء الحفظ</div>`; }
    };
    app.querySelectorAll('[data-show-qr]').forEach(btn => {
      btn.onclick = () => openBranchQrModal(btn.getAttribute('data-show-qr'));
    });
    app.querySelectorAll('[data-del-branch]').forEach(btn => {
      btn.onclick = async () => {
        try{ await branchesCol.doc(btn.getAttribute('data-del-branch')).delete(); showToast('تم حذف الفرع'); }
        catch(e){ showToast('حصلت مشكلة أثناء الحذف', true); }
      };
    });

    document.getElementById('add-holiday-btn').onclick = async () => {
      if(!debounceSubmit()) return;
      const date = document.getElementById('hol-date').value;
      const name = document.getElementById('hol-name').value.trim();
      if(!date || !name){ showToast('اكتب التاريخ والاسم', true); return; }
      try{
        await holidaysCol.add({ date, name });
        showToast('تمت إضافة العطلة');
        logAction('إضافة عطلة رسمية', `${name} (${date})`);
      }catch(e){ showToast('حصلت مشكلة أثناء الحفظ', true); }
    };
    app.querySelectorAll('[data-del-hol]').forEach(btn => {
      btn.onclick = async () => {
        try{ await holidaysCol.doc(btn.getAttribute('data-del-hol')).delete(); showToast('تم حذف العطلة'); }
        catch(e){ showToast('حصلت مشكلة أثناء الحذف', true); }
      };
    });

    document.getElementById('add-dept-btn').onclick = async () => {
      if(!debounceSubmit()) return;
      const name = document.getElementById('dept-name').value.trim();
      if(!name){ showToast('اكتب اسم القسم', true); return; }
      try{
        await departmentsCol.add({ name });
        showToast('تمت إضافة القسم');
        logAction('إضافة قسم', name);
      }catch(e){ showToast('حصلت مشكلة أثناء الحفظ', true); }
    };
    app.querySelectorAll('[data-del-dept]').forEach(btn => {
      btn.onclick = async () => {
        try{ await departmentsCol.doc(btn.getAttribute('data-del-dept')).delete(); showToast('تم حذف القسم'); }
        catch(e){ showToast('حصلت مشكلة أثناء الحذف', true); }
      };
    });
  }

  if(perms.manageManagers){
    document.getElementById('add-sup-btn').onclick = async () => {
      if(!debounceSubmit()) return;
      const name = document.getElementById('sup-name').value.trim();
      const username = document.getElementById('sup-user').value.trim();
      const password = document.getElementById('sup-pass').value;
      const errBox = document.getElementById('add-sup-error');
      if(!name || !username || !password){ errBox.innerHTML = `<div class="error-msg">من فضلك املأ كل الحقول</div>`; return; }
      if(users.some(u => u.username.toLowerCase() === username.toLowerCase())){
        errBox.innerHTML = `<div class="error-msg">اسم المستخدم ده مستخدم بالفعل</div>`; return;
      }
      try{
        await usersCol.add({ username, password, name, role:'supervisor' });
        showToast(`تمت إضافة المشرف ${name}`);
        logAction('إضافة مشرف', name);
      }catch(e){ errBox.innerHTML = `<div class="error-msg">حصلت مشكلة أثناء الحفظ</div>`; }
    };
    app.querySelectorAll('[data-del-sup]').forEach(btn => {
      btn.onclick = async () => {
        try{ await usersCol.doc(btn.getAttribute('data-del-sup')).delete(); showToast('تم حذف المشرف'); }
        catch(e){ showToast('حصلت مشكلة أثناء الحذف', true); }
      };
    });

    document.getElementById('create-invite-btn').onclick = async () => {
      if(!debounceSubmit()) return;
      const code = Array.from({length:6}, () => 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'[Math.floor(Math.random()*33)]).join('');
      try{
        await invitesCol.add({ code, createdBy: currentUser.name, createdAt: Date.now(), used:false });
        showToast(`تم إنشاء الكود: ${code}`);
        logAction('إنشاء كود دعوة', code);
      }catch(e){ showToast('حصلت مشكلة أثناء الحفظ', true); }
    };
    app.querySelectorAll('[data-del-invite]').forEach(btn => {
      btn.onclick = async () => {
        try{ await invitesCol.doc(btn.getAttribute('data-del-invite')).delete(); showToast('تم حذف الكود'); }
        catch(e){ showToast('حصلت مشكلة أثناء الحذف', true); }
      };
    });

    document.getElementById('appoint-btn').onclick = async () => {
      if(!debounceSubmit()) return;
      const username = document.getElementById('appoint-user').value.trim();
      const errBox = document.getElementById('appoint-error');
      if(!username){ errBox.innerHTML = `<div class="error-msg">اكتب اسم المستخدم</div>`; return; }
      const target = users.find(u => u.username.toLowerCase() === username.toLowerCase());
      if(!target){ errBox.innerHTML = `<div class="error-msg">مفيش حساب بالاسم ده. لازم يكون عنده حساب موظف الأول (تقدر تضيفه أو تبعتله دعوة)</div>`; return; }
      if(target.role === 'manager'){ errBox.innerHTML = `<div class="error-msg">الشخص ده مدير بالفعل</div>`; return; }
      const selectedPerms = {};
      app.querySelectorAll('.appoint-perm').forEach(cb => { selectedPerms[cb.getAttribute('data-perm')] = cb.checked; });
      try{
        await usersCol.doc(target.id).update({ role:'manager', permissions: selectedPerms, departmentId: firebase.firestore.FieldValue.delete(), startTime: firebase.firestore.FieldValue.delete() });
        showToast(`تم تعيين ${target.name} كمدير`);
        logAction('تعيين مدير جديد', target.name);
        document.getElementById('appoint-user').value = '';
      }catch(e){ errBox.innerHTML = `<div class="error-msg">حصلت مشكلة أثناء التعيين</div>`; }
    };

    app.querySelectorAll('[data-edit-perms]').forEach(btn => {
      btn.onclick = () => openEditManagerPermsModal(btn.getAttribute('data-edit-perms'));
    });
    app.querySelectorAll('[data-revoke-mgr]').forEach(btn => {
      btn.onclick = () => revokeManager(btn.getAttribute('data-revoke-mgr'));
    });
  }
}

/* ============ Manager permission management ============ */
function openEditManagerPermsModal(mgrId){
  const mgr = users.find(u => u.id === mgrId);
  if(!mgr) return;
  if(mgrId === currentUser.id){ showToast('مينفعش تعدّل صلاحياتك انت نفسك', true); return; }
  const currentPerms = mgr.permissions ? mgr.permissions : FULL_PERMS;
  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.innerHTML = `
    <div class="modal" style="text-align:right; max-width:420px;">
      <h3 style="text-align:center;">صلاحيات ${mgr.name}</h3>
      <div id="ep-error"></div>
      <div style="display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px;">
        ${PERMISSION_DEFS.map(p => `
          <label style="display:flex; align-items:center; gap:6px; font-size:12.5px; background:#fff; padding:8px 12px; border-radius:8px; border:1.5px solid var(--panel-line); max-width:260px;">
            <input type="checkbox" class="edit-perm" data-perm="${p.key}" ${currentPerms[p.key] ? 'checked' : ''}> ${p.label}
          </label>
        `).join('')}
      </div>
      <div class="modal-actions">
        <button class="secondary-btn" id="ep-cancel">إلغاء</button>
        <button class="primary-btn" id="ep-save">حفظ الصلاحيات</button>
      </div>
    </div>
  `;
  document.body.appendChild(backdrop);
  backdrop.querySelector('#ep-cancel').onclick = () => backdrop.remove();
  backdrop.querySelector('#ep-save').onclick = async () => {
    const newPerms = {};
    backdrop.querySelectorAll('.edit-perm').forEach(cb => { newPerms[cb.getAttribute('data-perm')] = cb.checked; });
    try{
      await usersCol.doc(mgrId).update({ permissions: newPerms });
      backdrop.remove();
      showToast(`تم تحديث صلاحيات ${mgr.name}`);
      logAction('تعديل صلاحيات مدير', mgr.name);
    }catch(e){
      document.getElementById('ep-error').innerHTML = `<div class="error-msg">حصلت مشكلة أثناء الحفظ</div>`;
    }
  };
}

function revokeManager(mgrId){
  const mgr = users.find(u => u.id === mgrId);
  if(!mgr) return;
  if(mgrId === currentUser.id){ showToast('مينفعش تلغي صلاحيتك أنت', true); return; }
  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.innerHTML = `
    <div class="modal">
      <h3>تأكيد إلغاء صلاحية المدير</h3>
      <div class="sub">هيرجع <b>${mgr.name}</b> حساب موظف عادي، ومش هيقدر يدخل على أي حاجة إدارية تاني.</div>
      <div class="modal-actions">
        <button class="secondary-btn" id="rv-cancel">إلغاء</button>
        <button class="primary-btn" id="rv-confirm" style="background:var(--danger);">تأكيد الإلغاء</button>
      </div>
    </div>
  `;
  document.body.appendChild(backdrop);
  backdrop.querySelector('#rv-cancel').onclick = () => backdrop.remove();
  backdrop.querySelector('#rv-confirm').onclick = async () => {
    try{
      await usersCol.doc(mgrId).update({ role:'employee', permissions: firebase.firestore.FieldValue.delete(), startTime: settings.defaultStartTime || '09:00', endTime: settings.defaultEndTime || '17:00' });
      backdrop.remove();
      showToast(`تم إلغاء صلاحية المدير عن ${mgr.name}`);
      logAction('إلغاء صلاحية مدير', mgr.name);
    }catch(e){
      backdrop.remove();
      showToast('حصلت مشكلة أثناء الحفظ', true);
    }
  };
}

function openBranchQrModal(branchId){
  const branch = branches.find(b => b.id === branchId);
  if(!branch) return;
  const qrUrl = location.origin + location.pathname + '?qr=' + encodeURIComponent(branchId);
  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.innerHTML = `
    <div class="modal" style="max-width:340px;">
      <h3>كود QR — ${branch.name}</h3>
      <div class="sub">اطبع الصفحة دي وحطها عند باب الفرع. الموظف يمسحها بكاميرا موبايله العادية قبل ما يسجل حضوره.</div>
      <div id="qr-code-box" style="display:flex; justify-content:center; margin:16px 0;"></div>
      <div class="modal-actions">
        <button class="secondary-btn" id="qr-print-btn">🖨 طباعة</button>
        <button class="primary-btn" id="qr-close-btn">إغلاق</button>
      </div>
    </div>
  `;
  document.body.appendChild(backdrop);
  const qrBox = backdrop.querySelector('#qr-code-box');
  if(typeof QRCode !== 'undefined'){
    new QRCode(qrBox, { text: qrUrl, width: 220, height: 220 });
  } else {
    qrBox.innerHTML = `<div class="empty-row">تعذر تحميل مكتبة الكود، تأكد من الاتصال بالإنترنت</div>`;
  }
  backdrop.querySelector('#qr-close-btn').onclick = () => backdrop.remove();
  backdrop.querySelector('#qr-print-btn').onclick = () => {
    const win = window.open('', '_blank');
    win.document.write(`
      <!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><title>QR - ${branch.name}</title>
      <style>body{font-family:Tahoma,Arial,sans-serif; text-align:center; padding:60px;} h1{font-size:22px;} img{margin-top:20px;}</style>
      </head><body>
      <h1>${settings.companyName || 'ساعة الحضور'}</h1>
      <div style="font-size:16px;">فرع: ${branch.name}</div>
      <div>${qrBox.innerHTML}</div>
      <div style="margin-top:20px; font-size:13px; color:#666;">امسح الكود ده بكاميرا موبايلك قبل ما تسجل حضورك أو انصرافك</div>
      <script>window.onload = () => window.print();<\/script>
      </body></html>
    `);
    win.document.close();
  };
}

/* ============ Boot: seed + live sync ============ */
async function seedIfEmpty(){
  try{
    const snap = await usersCol.limit(1).get();
    if(snap.empty){
      const batch = db.batch();
      batch.set(usersCol.doc(), {username:'manager', password:'admin123', name:'المدير العام', role:'manager'});
      batch.set(usersCol.doc(), {username:'ahmed', password:'123456', name:'أحمد محمود', role:'employee'});
      batch.set(usersCol.doc(), {username:'sara', password:'123456', name:'سارة علي', role:'employee'});
      await batch.commit();
    }
  }catch(e){
    bootError = true;
  }
}

function startLiveSync(){
  usersCol.onSnapshot(
    snap => { users = snap.docs.map(d => ({id:d.id, ...d.data()})); route(); },
    err => { showToast('في مشكلة في الاتصال بقاعدة البيانات', true); }
  );
  attendanceCol.onSnapshot(
    snap => { attendance = snap.docs.map(d => ({id:d.id, ...d.data()})).sort((a,b)=>b.ts-a.ts); route(); },
    err => {}
  );
  settingsCol.doc('general').onSnapshot(
    snap => { if(snap.exists) settings = { ...settings, ...snap.data() }; route(); },
    err => {}
  );
  holidaysCol.onSnapshot(
    snap => { holidays = snap.docs.map(d => ({id:d.id, ...d.data()})); route(); },
    err => {}
  );
  departmentsCol.onSnapshot(
    snap => { departments = snap.docs.map(d => ({id:d.id, ...d.data()})); route(); },
    err => {}
  );
  leaveCol.onSnapshot(
    snap => { leaveRequests = snap.docs.map(d => ({id:d.id, ...d.data()})); route(); },
    err => {}
  );
  auditCol.onSnapshot(
    snap => { auditLog = snap.docs.map(d => ({id:d.id, ...d.data()})); route(); },
    err => {}
  );
  invitesCol.onSnapshot(
    snap => { invites = snap.docs.map(d => ({id:d.id, ...d.data()})); route(); },
    err => {}
  );
  branchesCol.onSnapshot(
    snap => { branches = snap.docs.map(d => ({id:d.id, ...d.data()})); route(); },
    err => {}
  );
}

(async function init(){
  renderTopbarRight();
  document.getElementById('app').innerHTML = `<div class="boot-msg">جاري تحميل بيانات الشركة...</div>`;
  await seedIfEmpty();
  if(bootError){
    document.getElementById('app').innerHTML = `<div class="boot-msg">تعذر الاتصال بقاعدة البيانات.<br>راجع إعدادات Firebase (الاتصال بالإنترنت / قواعد الحماية).</div>`;
    return;
  }
  startLiveSync();
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }

  // If this page was opened by scanning an entrance QR code (?qr=branchId), remember it
  // for a short window so the punch modal can confirm real physical presence.
  const qrParam = new URLSearchParams(location.search).get('qr');
  if(qrParam){
    try{
      sessionStorage.setItem('qrVerified', JSON.stringify({ branchId: qrParam, ts: Date.now() }));
    }catch(e){}
    const cleanUrl = location.pathname + location.hash;
    history.replaceState({}, '', cleanUrl);
    showToast('تم التحقق من موقعك عبر كود QR ✅');
  }
})();
</script>
