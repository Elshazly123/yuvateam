<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ساعة الحضور</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#10182B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ساعة الحضور">
<link rel="preconnect" href="https://fonts.googleapis.com">

<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>

<style>
  :root{
    --bg-deep:#10182B;
    --bg-deep-2:#182541;
    --panel:#F6F3EC;
    --panel-line:#E4DECD;
    --ink:#B23A2E;
    --ink-dark:#8C2C22;
    --teal:#2F9C6E;
    --teal-dark:#227853;
    --gold:#D9A62B;
    --text-dark:#1B1F2A;
    --text-mute:#6B6455;
    --text-light:#F6F3EC;
    --danger:#C4453B;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:radial-gradient(circle at 20% 0%, var(--bg-deep-2), var(--bg-deep) 60%);
    color:var(--text-dark);
    font-family:'IBM Plex Sans Arabic', sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }
  h1,h2,h3,.display{
    font-family:'Cairo', sans-serif;
    font-weight:800;
    margin:0;
  }
  .mono{font-family:'IBM Plex Mono', monospace; letter-spacing:0.5px;}
  a{color:inherit;}
  button{font-family:inherit; cursor:pointer; border:none;}
  button:focus-visible, input:focus-visible, select:focus-visible{
    outline:3px solid var(--gold); outline-offset:2px;
  }
  ::selection{background:var(--gold); color:var(--text-dark);}

  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 28px; color:var(--text-light);
    border-bottom:1px solid rgba(246,243,236,0.08);
  }
  .brand{display:flex; align-items:center; gap:12px;}
  .brand-mark{
    width:38px;height:38px;border-radius:10px;
    background:linear-gradient(145deg, var(--gold), var(--ink));
    display:flex;align-items:center;justify-content:center;
    font-family:'Cairo',sans-serif; font-weight:800; color:var(--bg-deep); font-size:18px;
    flex-shrink:0;
  }
  .brand-name{font-size:19px;}
  .brand-sub{font-size:12px; color:rgba(246,243,236,0.55); margin-top:1px;}
  .clock{font-size:15px; color:var(--gold); display:flex; gap:10px; align-items:baseline;}
  .clock .date{color:rgba(246,243,236,0.6); font-size:12px;}
  .who{display:flex; align-items:center; gap:14px;}
  .who-name{font-size:14px; text-align:left;}
  .who-role{font-size:11px; color:rgba(246,243,236,0.55);}
  .logout-btn{
    background:transparent; color:rgba(246,243,236,0.75);
    border:1px solid rgba(246,243,236,0.25) !important;
    padding:7px 14px; border-radius:999px; font-size:13px; transition:all .15s ease;
  }
  .logout-btn:hover{background:rgba(246,243,236,0.1); color:var(--text-light);}

  main{flex:1; display:flex; flex-direction:column; align-items:center; padding:32px 20px 60px;}

  .login-wrap{margin:auto; display:flex; flex-direction:column; align-items:center; gap:28px; width:100%;}
  .punch-hero{display:flex; flex-direction:column; align-items:center; gap:8px; color:var(--text-light); text-align:center;}
  .punch-hero .brand-mark{width:56px;height:56px;font-size:26px;border-radius:14px;}
  .punch-hero h1{font-size:28px;}
  .punch-hero p{margin:0; color:rgba(246,243,236,0.6); font-size:14px;}

  .login-card{
    background:var(--panel); border-radius:var(--radius); padding:30px 28px;
    width:100%; max-width:360px; box-shadow:0 25px 60px -20px rgba(0,0,0,0.6);
    border:1px solid var(--panel-line); position:relative; overflow:hidden;
  }
  .login-card::before{
    content:""; position:absolute; inset:0 0 auto 0; height:6px;
    background:repeating-linear-gradient(90deg, var(--ink) 0 14px, transparent 14px 24px);
    opacity:0.5;
  }
  .field{margin-bottom:16px;}
  .field label{display:block; font-size:12px; color:var(--text-mute); margin-bottom:6px; font-weight:600;}
  .field input, .field select{
    width:100%; padding:11px 13px; border-radius:9px; border:1.5px solid var(--panel-line);
    background:#fff; font-size:14px; font-family:inherit; color:var(--text-dark);
  }
  .field input:focus, .field select:focus{border-color:var(--ink);}
  .primary-btn{
    width:100%; padding:13px; border-radius:9px; background:var(--ink); color:#fff;
    font-weight:600; font-size:15px; transition:background .15s ease, transform .1s ease;
  }
  .primary-btn:hover{background:var(--ink-dark);}
  .primary-btn:active{transform:scale(0.98);}
  .primary-btn:disabled{opacity:0.55; cursor:not-allowed;}
  .ghost-btn{background:transparent; color:var(--text-mute); font-size:13px; padding:8px; text-decoration:underline;}
  .error-msg{
    background:rgba(196,69,59,0.1); color:var(--danger); border:1px solid rgba(196,69,59,0.3);
    padding:9px 12px; border-radius:8px; font-size:13px; margin-bottom:14px;
  }

  .dash{width:100%; max-width:1000px; display:flex; flex-direction:column; gap:22px;}
  .panel{background:var(--panel); border-radius:var(--radius); padding:24px; border:1px solid rgba(255,255,255,0.06);}
  .panel h2{font-size:18px; margin-bottom:4px;}
  .panel .sub{color:var(--text-mute); font-size:13px; margin-bottom:18px;}

  .punchcard{
    background:#fff; border-radius:12px; border:1.5px dashed var(--panel-line);
    padding:26px; display:flex; flex-direction:column; align-items:center; gap:16px;
    position:relative; text-align:center;
  }
  .status-pill{display:inline-flex; align-items:center; gap:7px; padding:6px 14px; border-radius:999px; font-size:13px; font-weight:600;}
  .status-pill.in{background:rgba(47,156,110,0.12); color:var(--teal-dark);}
  .status-pill.out{background:rgba(178,58,46,0.1); color:var(--ink);}
  .status-dot{width:8px;height:8px;border-radius:50%;}
  .status-pill.in .status-dot{background:var(--teal);}
  .status-pill.out .status-dot{background:var(--ink);}

  .punch-btn{
    width:170px; height:170px; border-radius:50%;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px;
    font-family:'Cairo',sans-serif; font-weight:800; font-size:19px; color:#fff;
    box-shadow:0 14px 30px -10px rgba(0,0,0,0.35); transition:transform .12s ease;
  }
  .punch-btn:hover{transform:scale(1.03);}
  .punch-btn:active{transform:scale(0.97);}
  .punch-btn.act-in{background:radial-gradient(circle at 35% 30%, var(--teal), var(--teal-dark));}
  .punch-btn.act-out{background:radial-gradient(circle at 35% 30%, var(--ink), var(--ink-dark));}
  .punch-btn small{font-family:'IBM Plex Sans Arabic',sans-serif; font-weight:500; font-size:12px; opacity:0.85;}
  .last-stamp{font-size:12.5px; color:var(--text-mute);}
  .last-stamp b{color:var(--text-dark);}

  table{width:100%; border-collapse:collapse; font-size:13.5px;}
  th{text-align:right; color:var(--text-mute); font-weight:600; font-size:12px; padding:9px 10px; border-bottom:1.5px solid var(--panel-line);}
  td{padding:10px 10px; border-bottom:1px solid var(--panel-line); vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  .type-tag{display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:600; padding:4px 10px; border-radius:999px;}
  .type-tag.in{background:rgba(47,156,110,0.12); color:var(--teal-dark);}
  .type-tag.out{background:rgba(178,58,46,0.1); color:var(--ink);}
  .empty-row{text-align:center; color:var(--text-mute); padding:30px 10px; font-size:13px;}
  th.sortable{cursor:pointer; user-select:none;}
  th.sortable:hover{color:var(--text-dark);}
  .search-box{width:100%; max-width:280px;}
  .scroll-list{max-height:380px; overflow-y:auto; border:1px solid var(--panel-line); border-radius:10px;}
  .scroll-list table{margin:0;}
  .scroll-list thead th{position:sticky; top:0; background:var(--panel); z-index:1;}

  .filters{display:flex; gap:12px; margin-bottom:16px; flex-wrap:wrap;}
  .filters .field{margin:0; min-width:160px; flex:1;}

  .stat-row{display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:14px; margin-bottom:20px;}
  .stat-card{background:#fff; border-radius:10px; padding:16px; border:1px solid var(--panel-line);}
  .stat-card .num{font-family:'Cairo',sans-serif; font-weight:800; font-size:26px; color:var(--text-dark);}
  .stat-card .lbl{font-size:12px; color:var(--text-mute); margin-top:2px;}

  .row-between{display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;}
  .add-emp-btn{background:var(--bg-deep); color:var(--text-light); padding:10px 18px; border-radius:9px; font-size:13px; font-weight:600;}
  .add-emp-btn:hover{background:var(--bg-deep-2);}

  .modal-backdrop{
    position:fixed; inset:0; background:rgba(16,24,43,0.72);
    display:flex; align-items:center; justify-content:center; padding:20px; z-index:50;
  }
  .modal{
    background:var(--panel); border-radius:16px; padding:30px 26px;
    max-width:380px; width:100%; text-align:center; box-shadow:0 30px 70px -20px rgba(0,0,0,0.6);
  }
  .modal h3{font-size:18px; margin-bottom:6px;}
  .modal .sub{color:var(--text-mute); font-size:13px; margin-bottom:22px;}

  .scanner{
    width:120px; height:120px; margin:0 auto 20px; position:relative;
    display:flex; align-items:center; justify-content:center; border-radius:50%;
    background:#fff; border:2px solid var(--panel-line);
  }
  .scanner svg{width:56px; height:56px;}
  .scanner .ring{position:absolute; inset:0; border-radius:50%; stroke-dasharray:339; stroke-dashoffset:339;}
  .scanner.scanning .ring{animation:ringfill 1.3s linear forwards;}
  .scanner.done{border-color:var(--teal);}
  @keyframes ringfill{ to{stroke-dashoffset:0;} }
  .scan-status{font-size:13px; color:var(--text-mute); min-height:18px;}

  .loc-row{display:flex; align-items:center; justify-content:center; gap:6px; font-size:12.5px; color:var(--text-mute); margin-bottom:18px;}
  .loc-row.ok{color:var(--teal-dark);}
  .loc-row.bad{color:var(--danger);}

  .modal-actions{display:flex; gap:10px; margin-top:6px;}
  .modal-actions button{flex:1;}
  .secondary-btn{background:transparent; color:var(--text-mute); border:1.5px solid var(--panel-line) !important; padding:12px; border-radius:9px; font-size:14px;}
  .secondary-btn:hover{background:rgba(0,0,0,0.03);}

  .stamp-result{display:flex; flex-direction:column; align-items:center; gap:12px;}
  .stamp-mark{
    font-family:'Cairo',sans-serif; font-weight:800; font-size:22px; color:#fff;
    padding:14px 26px; border-radius:10px; transform:rotate(-6deg) scale(0.5); opacity:0;
    animation:stampIn .4s cubic-bezier(.2,1.4,.5,1) forwards; border:3px solid rgba(255,255,255,0.4);
  }
  .stamp-mark.in{background:var(--teal-dark);}
  .stamp-mark.out{background:var(--ink);}
  @keyframes stampIn{
    0%{transform:rotate(-6deg) scale(2.2); opacity:0;}
    60%{transform:rotate(-6deg) scale(0.92); opacity:1;}
    100%{transform:rotate(-6deg) scale(1); opacity:1;}
  }

  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:var(--bg-deep); color:var(--text-light); padding:12px 20px; border-radius:10px;
    font-size:13.5px; box-shadow:0 15px 40px -10px rgba(0,0,0,0.5); z-index:80;
    opacity:0; transition:opacity .25s ease; display:flex; align-items:center; gap:8px;
  }
  .toast.show{opacity:1;}
  .toast.err{background:var(--danger);}

  .boot-msg{color:rgba(246,243,236,0.6); margin:auto; font-size:14px; display:flex; flex-direction:column; align-items:center; gap:10px; text-align:center;}

  @media (max-width:640px){
    .topbar{padding:14px 16px;}
    .who-name{display:none;}
    main{padding:20px 12px 50px;}
    .panel{padding:18px;}
  }
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.01ms !important; transition-duration:0.01ms !important;}
  }
</style>
</head>

<div class="topbar">

    <div class="brand-mark" id="brand-mark-icon">⏱</div>
    <div>
      <div class="brand-name" id="brand-name-text">ساعة الحضور</div>
      <div class="brand-sub">نظام حضور وانصراف الموظفين</div>
    </div>
  </div>
  <div id="topbar-right"></div>
</div>

<main id="app"></main>

<script>
/* ============ Firebase setup ============ */
const firebaseConfig = {
  apiKey: "AIzaSyDnP8L5kj4mzLiiQYme8nzA7hrd3ou11xI",
  authDomain: "work-app-4fe46.firebaseapp.com",
  projectId: "work-app-4fe46",
  storageBucket: "work-app-4fe46.firebasestorage.app",
  messagingSenderId: "805492846342",
  appId: "1:805492846342:web:2547c641e401d8a752f887"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const usersCol = db.collection('users');
const attendanceCol = db.collection('attendance');
const settingsCol = db.collection('settings');
const holidaysCol = db.collection('holidays');
const departmentsCol = db.collection('departments');
const leaveCol = db.collection('leaveRequests');
const auditCol = db.collection('auditLog');
const invitesCol = db.collection('invites');
const branchesCol = db.collection('branches');

/* ============ App state ============ */
let users = [];
let attendance = [];
let currentUser = null;
let clockInterval = null;
let bootError = false;
let dashboardMonth = (() => {
  const n = new Date();
  return n.getFullYear() + '-' + String(n.getMonth()+1).padStart(2,'0');
})();
let settings = { workDays:[0,1,2,3,4,6], deductionPerDay:0, deductionPerLateMinute:0, currency:'جنيه', defaultStartTime:'09:00', defaultEndTime:'17:00', overtimeRatePerMinute:0, locationEnabled:false, verificationMethod:'fingerprint', qrEnabled:false };
let branches = [];
let holidays = [];
let departments = [];
let leaveRequests = [];
let auditLog = [];
let currentView = 'dashboard';
let dashSortKey = null;
let dashSortDir = -1;
let pendingDeleteIds = new Set();
let invites = [];
let authScreenRendered = null;

/* ============ Utilities ============ */
function fmtTime(ts){ return new Date(ts).toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'}); }
function fmtDate(ts){ return new Date(ts).toLocaleDateString('ar-EG', {day:'2-digit', month:'2-digit', year:'numeric'}); }
function todayKey(ts){ const d = new Date(ts); return d.getFullYear()+'-'+d.getMonth()+'-'+d.getDate(); }

/* ============ Work schedule (configurable via Settings) ============ */
function isWorkDay(date){ const wd = settings.workDays || [0,1,2,3,4,6]; return wd.includes(date.getDay()); }
function getQrVerification(){
  try{
    const raw = sessionStorage.getItem('qrVerified');
    if(!raw) return null;
    const data = JSON.parse(raw);
    if(Date.now() - data.ts > 30 * 60000) return null; // expires after 30 minutes
    return data;
  }catch(e){ return null; }
}
function distanceMeters(lat1, lng1, lat2, lng2){
  const R = 6371000; // Earth radius in meters
  const toRad = (d) => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2)**2;
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
}
function dateKeyYMD(date){
  return date.getFullYear() + '-' + String(date.getMonth()+1).padStart(2,'0') + '-' + String(date.getDate()).padStart(2,'0');
}
function isHoliday(date){ const key = dateKeyYMD(date); return holidays.some(h => h.date === key); }
function holidayName(date){ const key = dateKeyYMD(date); const h = holidays.find(h => h.date === key); return h ? h.name : ''; }
function hasApprovedLeave(userId, date){
  const key = dateKeyYMD(date);
  return leaveRequests.some(l => l.userId === userId && l.status === 'approved' && l.fromDate <= key && key <= l.toDate);
}
async function logAction(action, details){
  try{
    await auditCol.add({ ts: Date.now(), actorId: currentUser ? currentUser.id : null, actorName: currentUser ? currentUser.name : 'نظام', action, details: details || '' });
  }catch(e){ /* non-critical */ }
}
function getDateRange(fromStr, toStr, workOnly){
  const [fy,fm,fd] = fromStr.split('-').map(Number);
  const [ty,tm,td] = toStr.split('-').map(Number);
  const start = new Date(fy, fm-1, fd);
  const end = new Date(ty, tm-1, td);
  const dates = [];
  for(let d = new Date(start); d <= end; d.setDate(d.getDate()+1)){
    const day = new Date(d);
    if(workOnly && (!isWorkDay(day) || isHoliday(day))) continue;
    dates.push(day);
  }
  return dates;
}
function countFullMonthWorkDays(year, monthIdx){
  const daysInMonth = new Date(year, monthIdx+1, 0).getDate();
  let count = 0;
  for(let d = 1; d <= daysInMonth; d++){
    const date = new Date(year, monthIdx, d);
    if(isWorkDay(date) && !isHoliday(date)) count++;
  }
  return count;
}
function countElapsedWorkDays(year, monthIdx){
  const today = new Date();
  const daysInMonth = new Date(year, monthIdx+1, 0).getDate();
  let count = 0;
  for(let d = 1; d <= daysInMonth; d++){
    const date = new Date(year, monthIdx, d);
    if(date > today) break;
    if(isWorkDay(date) && !isHoliday(date)) count++;
  }
  return count;
}
function fmtMinutes(mins){
  if(mins <= 0) return '0 د';
  const h = Math.floor(mins/60), m = mins%60;
  if(h === 0) return `${m} د`;
  if(m === 0) return `${h} س`;
  return `${h} س ${m} د`;
}
function dayLabel(date){ return date.toLocaleDateString('ar-EG', {weekday:'long', day:'2-digit', month:'2-digit'}); }

/* Returns per-day breakdown + aggregate stats for one employee within a given month (0-indexed month) */
function getEmployeeShift(emp, date){
  const dow = date.getDay();
  if(emp.customSchedule && emp.customSchedule[dow]){
    const entry = emp.customSchedule[dow];
    if(entry.off) return null;
    return { start: entry.start || settings.defaultStartTime || '09:00', end: entry.end || settings.defaultEndTime || '17:00' };
  }
  // no personal override for this weekday - fall back to the company-wide calendar
  if(!isWorkDay(date)) return null;
  return { start: emp.startTime || settings.defaultStartTime || '09:00', end: emp.endTime || settings.defaultEndTime || '17:00' };
}
function computeEmployeeMonth(emp, year, month){
  const today = new Date();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const myIns = attendance.filter(r => r.userId === emp.id && r.type === 'in');
  const myOuts = attendance.filter(r => r.userId === emp.id && r.type === 'out');

  const days = [];
  let presentDays = 0, absentDays = 0, lateCount = 0, lateMinutesTotal = 0, workDaysCount = 0, leaveDays = 0, holidayDays = 0;
  let overtimeDays = 0, overtimeMinutesTotal = 0;

  for(let d = 1; d <= daysInMonth; d++){
    const date = new Date(year, month, d);
    if(date > today) continue; // future day, not evaluated yet

    const shift = getEmployeeShift(emp, date);
    if(!shift) continue; // this employee doesn't work this particular weekday at all (personal schedule or company calendar)

    if(isHoliday(date)){
      holidayDays++;
      days.push({date, status:'holiday', label:holidayName(date)});
      continue;
    }
    if(hasApprovedLeave(emp.id, date)){
      leaveDays++;
      days.push({date, status:'leave'});
      continue;
    }

    const [sh, sm] = shift.start.split(':').map(Number);
    const [eh, em] = shift.end.split(':').map(Number);

    workDaysCount++;
    const dayRecs = myIns.filter(r => {
      const rd = new Date(r.ts);
      return rd.getFullYear() === year && rd.getMonth() === month && rd.getDate() === d;
    }).sort((a,b) => a.ts - b.ts);
    const dayOuts = myOuts.filter(r => {
      const rd = new Date(r.ts);
      return rd.getFullYear() === year && rd.getMonth() === month && rd.getDate() === d;
    }).sort((a,b) => a.ts - b.ts);
    let overtimeMin = 0;
    if(dayOuts.length > 0){
      const lastOut = new Date(dayOuts[dayOuts.length - 1].ts);
      const expectedEnd = new Date(year, month, d, eh, em);
      const diff = Math.round((lastOut - expectedEnd) / 60000);
      if(diff > 0){ overtimeMin = diff; overtimeDays++; overtimeMinutesTotal += diff; }
    }

    if(dayRecs.length === 0){
      absentDays++;
      days.push({date, status:'absent'});
    } else {
      presentDays++;
      const firstIn = new Date(dayRecs[0].ts);
      const expected = new Date(year, month, d, sh, sm);
      const diffMin = Math.round((firstIn - expected) / 60000);
      if(diffMin > 0){
        lateCount++;
        lateMinutesTotal += diffMin;
        days.push({date, status:'late', ts:dayRecs[0].ts, lateMin:diffMin, outTs: dayOuts.length ? dayOuts[dayOuts.length-1].ts : null, overtimeMin});
      } else {
        days.push({date, status:'ontime', ts:dayRecs[0].ts, outTs: dayOuts.length ? dayOuts[dayOuts.length-1].ts : null, overtimeMin});
      }
    }
  }
  const deduction = (absentDays * (settings.deductionPerDay || 0)) + (lateMinutesTotal * (settings.deductionPerLateMinute || 0));
  const overtimePay = overtimeMinutesTotal * (settings.overtimeRatePerMinute || 0);
  const baseSalary = emp.baseSalary || 0;
  const netSalary = baseSalary - deduction + overtimePay;
  return { workDaysCount, presentDays, absentDays, lateCount, lateMinutesTotal, leaveDays, holidayDays, overtimeDays, overtimeMinutesTotal, overtimePay, deduction, baseSalary, netSalary, days };
}
let lastSubmitTs = 0;
function debounceSubmit(){
  const now = Date.now();
  if(now - lastSubmitTs < 1500) return false; // ignore rapid double-clicks/taps
  lastSubmitTs = now;
  return true;
}
function showToast(msg, isErr){
  const old = document.querySelector('.toast');
  if(old) old.remove();
  const t = document.createElement('div');
  t.className = 'toast' + (isErr ? ' err' : '');
  t.textContent = msg;
  document.body.appendChild(t);
  requestAnimationFrame(()=> t.classList.add('show'));
  setTimeout(()=>{ t.classList.remove('show'); setTimeout(()=>t.remove(), 300); }, 2600);
}
function showUndoToast(msg, onUndo){
  const old = document.querySelector('.toast');
  if(old) old.remove();
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = `<span>${msg}</span>`;
  const btn = document.createElement('button');
  btn.textContent = 'تراجع';
  btn.style.cssText = 'background:transparent;border:1px solid rgba(246,243,236,0.4) !important;color:#fff;border-radius:999px;padding:4px 12px;font-size:12px;margin-right:4px;';
  btn.onclick = () => { onUndo(); t.classList.remove('show'); setTimeout(()=>t.remove(), 300); };
  t.appendChild(btn);
  document.body.appendChild(t);
  requestAnimationFrame(()=> t.classList.add('show'));
  setTimeout(()=>{ if(document.body.contains(t)){ t.classList.remove('show'); setTimeout(()=>t.remove(), 300); } }, 6000);
}

async function doSignup(){
  if(!debounceSubmit()) return;
  const inviteCode = document.getElementById('su-invite').value.trim().toUpperCase();
  const name = document.getElementById('su-name').value.trim();
  const username = document.getElementById('su-user').value.trim();
  const pass = document.getElementById('su-pass').value;
  const confirm = document.getElementById('su-confirm').value;

  if(!inviteCode || !name || !username || !pass){ renderSignup('من فضلك املأ كل الحقول'); return; }
  const invite = invites.find(i => i.code === inviteCode && !i.used);
  if(!invite){ renderSignup('كود الدعوة غير صحيح أو مستخدم قبل كده. اطلب كود جديد من مديرك'); return; }
  if(pass.length < 4){ renderSignup('كلمة المرور لازم تكون 4 حروف/أرقام على الأقل'); return; }
  if(pass !== confirm){ renderSignup('كلمة المرور وتأكيدها مش متطابقين'); return; }
  if(users.some(u => u.username.toLowerCase() === username.toLowerCase())){
    renderSignup('اسم المستخدم ده مستخدم بالفعل، جرب اسم تاني'); return;
  }
  try{
    const docRef = await usersCol.add({ username, password: pass, name, role:'employee' });
    await invitesCol.doc(invite.id).update({ used:true, usedBy:name, usedAt:Date.now() });
    currentUser = { id: docRef.id, username, password: pass, name, role:'employee' };
    showToast(`أهلًا بيك يا ${name}، تم إنشاء حسابك`);
    logAction('انضمام موظف بدعوة', name);
    route();
  }catch(e){
    renderSignup('حصلت مشكلة أثناء إنشاء الحساب، حاول تاني');
  }
}

];
const FULL_PERMS = Object.fromEntries(PERMISSION_DEFS.map(p => [p.key, true]));
function getPerms(user){
  if(user.role === 'manager'){
    // no saved permissions object = legacy/founding manager account = full access
    const p = user.permissions ? {...user.permissions} : {...FULL_PERMS};
    p.isManager = true;
    return p;
  }
  const none = Object.fromEntries(PERMISSION_DEFS.map(p => [p.key, false]));
  none.isManager = false;
  return none;
}

        <button class="ghost-btn" id="retry-cam-btn" style="padding:4px; text-decoration:underline;">🔄 إعادة محاولة تشغيل الكاميرا</button>
        <button class="ghost-btn" id="cam-help-btn" style="padding:4px; text-decoration:underline;">❓ مش عارف تفعّل الكاميرا؟</button>

      ` : `

          <path d="M12 2c3 0 5.5 2.2 5.5 5.2 0 3-1 4-1 7 0 2 .5 3.5 1.5 5" stroke-linecap="round"/>
          <path d="M8.5 7.2C8.5 5.3 10 4 12 4s3.5 1.3 3.5 3.2c0 3.3 1 5 1 8.3" stroke-linecap="round"/>
          <path d="M6.5 12c0 4-1 6.5-2.5 8.5" stroke-linecap="round"/>
          <path d="M15.5 12.5c0 2.7.3 4.7 1.3 6.5" stroke-linecap="round"/>
          <path d="M10 9.5c0 4 .5 6.5 3 9.5" stroke-linecap="round"/>
        </svg>
        <svg class="ring" viewBox="0 0 120 120" style="position:absolute; inset:0;">
          <circle cx="60" cy="60" r="54" fill="none" stroke="#2F9C6E" stroke-width="4"/>
        </svg>
      </div>
      <div class="scan-status" id="scan-status">اضغط "تأكيد بالبصمة" للمتابعة</div>
      `}

      <div class="modal-actions">
        <button class="secondary-btn" id="cancel-punch">إلغاء</button>
        <button class="primary-btn" id="confirm-punch">${useSelfie ? '📸 التقط الصورة وسجّل' : 'تأكيد بالبصمة'}</button>
      </div>
    </div>
  `;
  document.body.appendChild(backdrop);

  let coords = null;
  let withinRange = null; // null = not yet checked, true/false once known
  const candidateBranches = currentUser.branchId
    ? branches.filter(b => b.id === currentUser.branchId)
    : branches;
  const geoRestricted = !!(settings.locationEnabled && candidateBranches.length > 0);
  const locRow = backdrop.querySelector('#loc-row');

  const handleCoords = (pos) => {
    coords = {lat: pos.coords.latitude.toFixed(5), lng: pos.coords.longitude.toFixed(5)};
    if(geoRestricted){
      let nearest = null;
      candidateBranches.forEach(b => {
        const dist = distanceMeters(pos.coords.latitude, pos.coords.longitude, b.lat, b.lng);
        if(!nearest || dist < nearest.dist) nearest = {branch:b, dist};
      });
      withinRange = nearest.dist <= nearest.branch.radiusMeters;
      if(withinRange){
        locRow.textContent = `📍 داخل نطاق ${nearest.branch.name} (${Math.round(nearest.dist)} م)`;
        locRow.className = 'loc-row ok';
      } else {
        locRow.textContent = `📍 برّه نطاق ${nearest.branch.name} (بعيد ${Math.round(nearest.dist)} م، المسموح ${nearest.branch.radiusMeters} م)`;
        locRow.className = 'loc-row bad';
      }
    } else {
      locRow.textContent = `📍 تم تحديد الموقع (${coords.lat}, ${coords.lng})`;
      locRow.className = 'loc-row ok';
    }
  };
  const handleGeoError = () => {
    if(geoRestricted){
      withinRange = false;
      locRow.textContent = '📍 لازم تسمح بالوصول للموقع عشان تقدر تسجل من هنا';
    } else {
      locRow.textContent = '📍 تعذّر الوصول للموقع — هيتسجل بدون إحداثيات';
    }
    locRow.className = 'loc-row bad';
    const actionsRow = backdrop.querySelector('#loc-actions');
    if(actionsRow) actionsRow.style.display = 'flex';
  };

  const tryLocate = () => {
    locRow.textContent = '📍 جاري تحديد الموقع...';
    locRow.className = 'loc-row';
    const actionsRow = backdrop.querySelector('#loc-actions');
    if(actionsRow) actionsRow.style.display = 'none';
    if('geolocation' in navigator){
      try{
        navigator.geolocation.getCurrentPosition(handleCoords, handleGeoError, {timeout:8000});
      }catch(e){
        handleGeoError();
      }
    } else {
      if(geoRestricted) withinRange = false;
      locRow.textContent = geoRestricted ? '📍 الموقع غير مدعوم على هذا الجهاز، مينفعش تسجل من غيره' : '📍 الموقع غير مدعوم على هذا الجهاز';
      locRow.className = 'loc-row bad';
    }
  };
  tryLocate();
  backdrop.querySelector('#retry-loc-btn').onclick = tryLocate;
  backdrop.querySelector('#loc-help-btn').onclick = openLocationHelpModal;

  /* ---- Selfie camera handling ---- */
  let camStream = null;
  let camReady = false;
  const stopCamera = () => {
    if(camStream){ camStream.getTracks().forEach(t => t.stop()); camStream = null; }
  };

  if(useSelfie){
    const video = backdrop.querySelector('#selfie-video');
    const status = backdrop.querySelector('#scan-status');
    const camActions = backdrop.querySelector('#selfie-actions');
    const confirmBtn = backdrop.querySelector('#confirm-punch');

    const startCamera = async () => {
      camReady = false;
      confirmBtn.disabled = true;
      status.textContent = 'جاري تشغيل الكاميرا...';
      camActions.style.display = 'none';
      try{
        camStream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode:'user' }, audio:false });
        video.srcObject = camStream;
        camReady = true;
        confirmBtn.disabled = false;
        status.textContent = 'الكاميرا شغالة — دوس "التقط الصورة" لما تكون جاهز';
      }catch(e){
        camReady = false;
        confirmBtn.disabled = true;
        status.textContent = '🚫 لازم تسمح بالوصول للكاميرا عشان تقدر تسجل';
        camActions.style.display = 'flex';
      }
    };
    startCamera();
    backdrop.querySelector('#retry-cam-btn').onclick = startCamera;
    backdrop.querySelector('#cam-help-btn').onclick = () => openLocationHelpModal(true);
  }

  backdrop.querySelector('#cancel-punch').onclick = () => { stopCamera(); backdrop.remove(); };
  backdrop.querySelector('#confirm-punch').onclick = (e) => {
    if(geoRestricted && withinRange === null){
      showToast('لسه بيتحدد موقعك، استنى ثانية وجرب تاني', true);
      return;
    }
    if(geoRestricted && withinRange === false){
      showToast('التسجيل مسموح بس من موقع الشركة المحدد', true);
      return;
    }
    if(settings.qrEnabled){
      const qr = getQrVerification();
      const branchOk = qr && (!currentUser.branchId || qr.branchId === currentUser.branchId);
      if(!branchOk){
        showToast('لازم تعمل مسح لكود QR الموجود عند الباب الأول', true);
        return;
      }
    }
    if(useSelfie && !camReady){
      showToast('لازم الكاميرا تشتغل الأول', true);
      return;
    }
    const btn = e.currentTarget;
    btn.disabled = true;
    backdrop.querySelector('#cancel-punch').disabled = true;

    if(useSelfie){
      const video = backdrop.querySelector('#selfie-video');
      const canvas = backdrop.querySelector('#selfie-canvas');
      const status = backdrop.querySelector('#scan-status');
      const size = 320;
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      const vw = video.videoWidth, vh = video.videoHeight;
      const cropSize = Math.min(vw, vh);
      ctx.translate(size, 0); ctx.scale(-1, 1); // undo the mirrored preview so the saved photo isn't flipped
      ctx.drawImage(video, (vw-cropSize)/2, (vh-cropSize)/2, cropSize, cropSize, 0, 0, size, size);
      const selfieDataUrl = canvas.toDataURL('image/jpeg', 0.55);
      stopCamera();
      status.textContent = 'تم التقاط الصورة ✓';
      finalizePunch(type, coords, backdrop, selfieDataUrl);
    } else {
      const scanner = backdrop.querySelector('#scanner');
      const status = backdrop.querySelector('#scan-status');
      scanner.classList.add('scanning');
      status.textContent = 'جاري التحقق من البصمة...';
      setTimeout(async () => {
        scanner.classList.remove('scanning');
        scanner.classList.add('done');
        status.textContent = 'تم التحقق ✓';
        await finalizePunch(type, coords, backdrop, null);
      }, 1300);
    }
  };
}

async function finalizePunch(type, coords, backdrop, selfie){
  const record = {
    userId: currentUser.id,
    name: currentUser.name,
    username: currentUser.username,
    type: type,
    ts: Date.now(),
    lat: coords ? coords.lat : null,
    lng: coords ? coords.lng : null
  };
  if(selfie) record.selfie = selfie;
  let ok = true;
  try{ await attendanceCol.add(record); }catch(e){ ok = false; }

  const modal = backdrop.querySelector('#punch-modal');
  const kiosk = !!settings.kioskMode;
  modal.innerHTML = `
    <div class="stamp-result">
      ${selfie ? `<img src="${selfie}" style="width:90px; height:90px; border-radius:50%; object-fit:cover; border:3px solid var(--teal);">` : ''}
      <div class="stamp-mark ${type}">${type === 'in' ? 'تم تسجيل الحضور' : 'تم تسجيل الانصراف'}</div>
      <div class="sub" style="margin:0;">${fmtDate(record.ts)} — الساعة ${fmtTime(record.ts)}${kiosk ? ' — شكرًا ' + currentUser.name : ''}</div>
      <button class="primary-btn" id="close-modal" style="margin-top:10px;">${kiosk ? 'تمام (هيرجع لشاشة الدخول)' : 'تمام'}</button>
    </div>
  `;
  const finish = () => {
    backdrop.remove();
    if(!ok) showToast('حصلت مشكلة في حفظ التسجيل، حاول تاني', true);
    if(kiosk) logout(); else route();
  };
  modal.querySelector('#close-modal').onclick = finish;
  if(kiosk) setTimeout(() => { if(document.body.contains(backdrop)) finish(); }, 4000);
}

/* ============ Attendance table ============ */
function renderAttendanceTable(records, showName){
  if(records.length === 0) return `<div class="empty-row">مفيش تسجيلات لسه</div>`;
  const rows = records.slice(0, 100).map(r => `
    <tr>
      ${showName ? `<td>${r.name}</td>` : ''}
      <td>${fmtDate(r.ts)}</td>
      <td>${fmtTime(r.ts)}</td>
      <td><span class="type-tag ${r.type}">${r.type === 'in' ? 'حضور' : 'انصراف'}</span></td>
      <td class="mono" style="color:var(--text-mute); font-size:11.5px;">${r.lat ? `${r.lat}, ${r.lng}` : '—'}</td>
      <td>${r.selfie ? `<img src="${r.selfie}" data-view-selfie="${r.selfie}" style="width:32px; height:32px; border-radius:50%; object-fit:cover; cursor:pointer; border:1.5px solid var(--panel-line);">` : '—'}</td>
    </tr>
  `).join('');

      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}
function wireSelfieThumbnails(container){
  container.querySelectorAll('[data-view-selfie]').forEach(img => {
    img.onclick = () => {
      const backdrop = document.createElement('div');
      backdrop.className = 'modal-backdrop';
      backdrop.innerHTML = `<div class="modal" style="max-width:340px;"><img src="${img.getAttribute('data-view-selfie')}" style="width:100%; border-radius:12px;"><button class="secondary-btn" id="close-selfie-view" style="margin-top:14px;">إغلاق</button></div>`;

    };
  });
}

/* ============ Monthly dashboard (attendance / absence / lateness / deductions) ============ */
function renderTrendChart(){
  const box = document.getElementById('trend-chart');
  if(!box) return;
  const employees = users.filter(u => u.role === 'employee' && !pendingDeleteIds.has(u.id));
  if(employees.length === 0){ box.innerHTML = `<div class="empty-row">مفيش موظفين لسه</div>`; return; }

  const now = new Date();
  const months = [];
  for(let i = 5; i >= 0; i--){
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    months.push({ year: d.getFullYear(), monthIdx: d.getMonth(), label: d.toLocaleDateString('ar-EG', {month:'short', year:'2-digit'}) });
  }

  const points = months.map(m => {
    const rows = employees.map(e => computeEmployeeMonth(e, m.year, m.monthIdx));
    const withDays = rows.filter(r => r.workDaysCount > 0);
    const avgRate = withDays.length > 0
      ? Math.round(withDays.reduce((s,r)=> s + (r.presentDays / r.workDaysCount), 0) / withDays.length * 100)
      : null; // null = no data for that month yet
    return { ...m, avgRate };
  });

  box.innerHTML = `
    <div style="display:flex; align-items:flex-end; gap:10px; height:160px; padding-top:10px;">
      ${points.map(p => {
        const height = p.avgRate === null ? 4 : Math.max(p.avgRate, 4);
        const color = p.avgRate === null ? 'var(--panel-line)' : p.avgRate >= 90 ? 'var(--teal)' : p.avgRate >= 75 ? 'var(--gold)' : 'var(--ink)';
        return `
        <div style="flex:1; display:flex; flex-direction:column; align-items:center; gap:6px;">
          <div style="font-size:11px; color:var(--text-mute);">${p.avgRate === null ? '—' : p.avgRate + '%'}</div>
          <div style="width:100%; max-width:44px; height:${height}%; background:${color}; border-radius:6px 6px 0 0; transition:height .3s;"></div>
          <div style="font-size:11px; color:var(--text-mute);">${p.label}</div>
        </div>`;
      }).join('')}
    </div>
  `;
}

function renderStreakBoard(){
  const box = document.getElementById('streak-board');
  if(!box) return;
  const employees = users.filter(u => u.role === 'employee' && !pendingDeleteIds.has(u.id));
  if(employees.length === 0){ box.innerHTML = `<div class="empty-row">مفيش موظفين لسه</div>`; return; }

  const now = new Date();
  const results = employees.map(e => {
    // look across the current + previous month so a streak isn't artificially cut at month boundaries
    const daysThisMonth = computeEmployeeMonth(e, now.getFullYear(), now.getMonth()).days;
    const prev = new Date(now.getFullYear(), now.getMonth() - 1, 1);
    const daysPrevMonth = computeEmployeeMonth(e, prev.getFullYear(), prev.getMonth()).days;
    const allDays = daysPrevMonth.concat(daysThisMonth);
    let streak = 0;
    for(let i = allDays.length - 1; i >= 0; i--){
      const st = allDays[i].status;
      if(st === 'holiday' || st === 'leave') continue; // neutral, doesn't break the streak
      if(st === 'ontime') { streak++; continue; }
      break; // late or absent ends the streak
    }
    return { emp: e, streak };
  }).filter(r => r.streak > 0).sort((a,b) => b.streak - a.streak).slice(0, 5);

  if(results.length === 0){ box.innerHTML = `<div class="empty-row">لسه مفيش سلاسل حضور تتسجل</div>`; return; }
  const medals = ['🥇','🥈','🥉'];
  box.innerHTML = results.map((r, i) => `
    <div style="display:flex; align-items:center; gap:10px; padding:8px 0; ${i < results.length-1 ? 'border-bottom:1px solid var(--panel-line);' : ''}">
      <div style="width:28px; font-size:16px; text-align:center;">${medals[i] || (i+1)}</div>
      <div style="flex:1; font-size:13.5px;">${r.emp.name}</div>
      <div class="type-tag in">${r.streak} يوم على التوالي</div>
    </div>
  `).join('');
}
function renderDashboardMonth(){
  const box = document.getElementById('dash-content');
  if(!box) return;
  const [year, month] = dashboardMonth.split('-').map(Number);
  const deptFilterEl = document.getElementById('dash-dept-filter');
  const deptFilter = deptFilterEl ? deptFilterEl.value : '';
  let employees = users.filter(u => u.role === 'employee' && !pendingDeleteIds.has(u.id));
  if(deptFilter) employees = employees.filter(e => e.departmentId === deptFilter);

  if(employees.length === 0){
    box.innerHTML = `<div class="empty-row">مفيش موظفين لسه عشان نعرض بياناتهم</div>`;
    return;
  }

  // <input type="month"> gives a 1-indexed month; JS Date wants 0-indexed
  let rows = employees.map(e => ({ emp: e, stats: computeEmployeeMonth(e, year, month-1) }));
  if(dashSortKey){
    rows.sort((a,b) => (a.stats[dashSortKey] - b.stats[dashSortKey]) * dashSortDir);
  }
  const totalWorkDays = countElapsedWorkDays(year, month-1);
  const totalWorkDaysFullMonth = countFullMonthWorkDays(year, month-1);
  const totalAbsences = rows.reduce((s,r)=> s + r.stats.absentDays, 0);
  const totalLate = rows.reduce((s,r)=> s + r.stats.lateCount, 0);

  const totalOvertimeMin = rows.reduce((s,r)=> s + r.stats.overtimeMinutesTotal, 0);
  const totalOvertimePay = rows.reduce((s,r)=> s + r.stats.overtimePay, 0);
  const totalNetSalary = rows.reduce((s,r)=> s + (r.stats.baseSalary > 0 ? r.stats.netSalary : 0), 0);
  const avgAttendanceRate = rows.length > 0
    ? Math.round((rows.reduce((s,r)=> s + (r.stats.workDaysCount > 0 ? r.stats.presentDays / r.stats.workDaysCount : 1), 0) / rows.length) * 100)
    : 0;

  const barsHtml = rows.map(r => {

        </div>

  box.innerHTML = `
    <div class="stat-row">
      <div class="stat-card"><div class="num">${totalWorkDays}</div><div class="lbl">أيام العمل حتى الآن (من إجمالي ${totalWorkDaysFullMonth})</div></div>
      <div class="stat-card"><div class="num">${avgAttendanceRate}%</div><div class="lbl">متوسط نسبة الحضور</div></div>
      <div class="stat-card"><div class="num">${totalAbsences}</div><div class="lbl">إجمالي أيام الغياب</div></div>
      <div class="stat-card"><div class="num">${totalLate}</div><div class="lbl">إجمالي مرات التأخير</div></div>
      <div class="stat-card"><div class="num">${fmtMinutes(totalOvertimeMin)}</div><div class="lbl">إجمالي الوقت الإضافي</div></div>
    </div>
    <div style="margin-bottom:22px;">${barsHtml}</div>
    <table>
      <thead><tr>
        <th>الموظف</th><th>الحضور (حتى الآن)</th><th class="sortable" data-sort="absentDays">أيام الغياب ⇅</th><th class="sortable" data-sort="lateCount">مرات التأخير ⇅</th><th class="sortable" data-sort="lateMinutesTotal">إجمالي وقت التأخير ⇅</th><th class="sortable" data-sort="overtimeMinutesTotal">الوقت الإضافي ⇅</th><th class="sortable" data-sort="deduction">الخصم المتوقع ⇅</th><th>مستحق الإضافي</th><th class="sortable" data-sort="netSalary">صافي الراتب ⇅</th><th></th>
      </tr></thead>
      <tbody>
        ${rows.map(r => `
          <tr>
            <td>${r.emp.name}</td>
            <td>${r.stats.presentDays} / ${r.stats.workDaysCount}</td>
            <td>${r.stats.absentDays > 0 ? `<span class="type-tag out">${r.stats.absentDays}</span>` : '0'}</td>
            <td>${r.stats.lateCount > 0 ? `<span class="type-tag out">${r.stats.lateCount}</span>` : '0'}</td>
            <td class="mono">${fmtMinutes(r.stats.lateMinutesTotal)}</td>
            <td class="mono">${r.stats.overtimeMinutesTotal > 0 ? `<span class="type-tag in">${fmtMinutes(r.stats.overtimeMinutesTotal)}</span>` : '—'}</td>
            <td class="mono">${r.stats.deduction > 0 ? `${r.stats.deduction.toFixed(2)} ${settings.currency}` : '—'}</td>
            <td class="mono">${r.stats.overtimePay > 0 ? `${r.stats.overtimePay.toFixed(2)} ${settings.currency}` : '—'}</td>
            <td class="mono">${r.stats.baseSalary > 0 ? `<b>${r.stats.netSalary.toFixed(2)}</b> ${settings.currency}` : '—'}</td>
            <td><button class="secondary-btn" style="padding:6px 10px; font-size:12px; width:auto;" data-detail="${r.emp.id}">التفاصيل</button></td>
          </tr>
        `).join('')}
        <tr style="font-weight:700;">
          <td>الإجمالي</td><td>—</td><td>${totalAbsences}</td><td>${totalLate}</td><td>—</td>
          <td class="mono">${fmtMinutes(totalOvertimeMin)}</td>
          <td class="mono">${totalDeduction > 0 ? `${totalDeduction.toFixed(2)} ${settings.currency}` : '—'}</td>
          <td class="mono">${totalOvertimePay > 0 ? `${totalOvertimePay.toFixed(2)} ${settings.currency}` : '—'}</td>
          <td class="mono">${totalNetSalary > 0 ? `${totalNetSalary.toFixed(2)} ${settings.currency}` : '—'}</td>

      </tbody>
    </table>
  `;
  box.querySelectorAll('[data-detail]').forEach(btn => {
    btn.onclick = () => openEmployeeMonthDetail(btn.getAttribute('data-detail'), year, month-1);
  });
  box.querySelectorAll('.sortable').forEach(th => {
    th.onclick = () => {
      const key = th.getAttribute('data-sort');
      if(dashSortKey === key) dashSortDir *= -1;
      else { dashSortKey = key; dashSortDir = -1; }
      renderDashboardMonth();
    };
  });
}

function exportMonthlyCsv(){
  const [year, month] = dashboardMonth.split('-').map(Number);

  let employees = users.filter(u => u.role === 'employee' && !pendingDeleteIds.has(u.id));

  const rows = employees.map(e => ({ emp: e, stats: computeEmployeeMonth(e, year, month-1) }));
  const header = ['الاسم','أيام العمل','أيام الحضور','أيام الغياب','مرات التأخير','إجمالي دقايق التأخير','دقايق الوقت الإضافي',`الخصم (${settings.currency})`,`مستحق الإضافي (${settings.currency})`,`الراتب الأساسي (${settings.currency})`,`صافي الراتب (${settings.currency})`];
  const lines = [header.join(',')];
  rows.forEach(r => {
    lines.push([
      `"${r.emp.name}"`, r.stats.workDaysCount, r.stats.presentDays, r.stats.absentDays,
      r.stats.lateCount, r.stats.lateMinutesTotal, r.stats.overtimeMinutesTotal, r.stats.deduction.toFixed(2), r.stats.overtimePay.toFixed(2),
      r.stats.baseSalary.toFixed(2), r.stats.netSalary.toFixed(2)
    ].join(','));
  });
  const csv = '\uFEFF' + lines.join('\n');

  const a = document.createElement('a');

  a.download = `تقرير-الحضور-${dashboardMonth}.csv`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function renderMonthHeatmap(stats, year, monthIdx){
  const HEATMAP_COLORS = { ontime:'var(--teal)', late:'var(--gold)', absent:'var(--ink)', leave:'#8fb8e8', holiday:'var(--panel-line)', empty:'transparent' };
  const dayMap = {};
  stats.days.forEach(d => { dayMap[d.date.getDate()] = d; });
  const daysInMonth = new Date(year, monthIdx+1, 0).getDate();
  // column order matches WEEKDAYS_AR: Sat,Sun,Mon,Tue,Wed,Thu,Fri
  const colOf = (jsDay) => (jsDay + 1) % 7;
  const firstCol = colOf(new Date(year, monthIdx, 1).getDay());

  let cells = '';
  for(let i = 0; i < firstCol; i++) cells += `<div style="width:22px; height:22px;"></div>`;
  for(let d = 1; d <= daysInMonth; d++){
    const entry = dayMap[d];
    const color = entry ? (HEATMAP_COLORS[entry.status] || 'var(--panel-line)') : 'rgba(0,0,0,0.04)';
    const title = entry ? `${d}: ${entry.status}` : `${d}`;
    cells += `<div title="${title}" style="width:22px; height:22px; border-radius:5px; background:${color}; display:flex; align-items:center; justify-content:center; font-size:9px; color:rgba(0,0,0,0.35);">${d}</div>`;
  }

  return `
    <div style="margin-bottom:16px;">
      <div style="display:grid; grid-template-columns:repeat(7,22px); gap:4px; justify-content:center; margin-bottom:8px;">
        ${WEEKDAYS_AR.map(w => `<div style="width:22px; text-align:center; font-size:9px; color:var(--text-mute);">${w.l[0]}</div>`).join('')}
      </div>
      <div style="display:grid; grid-template-columns:repeat(7,22px); gap:4px; justify-content:center;">${cells}</div>
      <div style="display:flex; gap:10px; justify-content:center; margin-top:10px; font-size:10.5px; color:var(--text-mute); flex-wrap:wrap;">
        <span>🟩 في الميعاد</span><span>🟨 متأخر</span><span>🟥 غياب</span><span>🟦 إجازة</span>
      </div>
    </div>
  `;
}

function openChangePasswordModal(){
  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';

    <div class="modal" style="text-align:right;">
      <h3 style="text-align:center;">تغيير كلمة المرور</h3>

      <div class="field"><label for="cp-new">كلمة المرور الجديدة</label><input id="cp-new" type="password" placeholder="••••••••"></div>

        <button class="primary-btn" id="cp-save">حفظ</button>

    </div>
  `;
  document.body.appendChild(backdrop);
  backdrop.querySelector('#cp-cancel').onclick = () => backdrop.remove();
  backdrop.querySelector('#cp-save').onclick = async () => {
    const oldP = document.getElementById('cp-old').value;
    const newP = document.getElementById('cp-new').value;
    const confP = document.getElementById('cp-confirm').value;
    const errBox = document.getElementById('cp-error');
    if(oldP !== currentUser.password){ errBox.innerHTML = `<div class="error-msg">كلمة المرور الحالية غلط</div>`; return; }
    if(!newP || newP.length < 4){ errBox.innerHTML = `<div class="error-msg">كلمة المرور الجديدة لازم تكون 4 حروف/أرقام على الأقل</div>`; return; }
    if(newP !== confP){ errBox.innerHTML = `<div class="error-msg">كلمة المرور الجديدة مش متطابقة مع التأكيد</div>`; return; }
    try{
      await usersCol.doc(currentUser.id).update({ password: newP });
      currentUser.password = newP;
      backdrop.remove();
      showToast('تم تغيير كلمة المرور بنجاح');
    }catch(e){
      errBox.innerHTML = `<div class="error-msg">حصلت مشكلة أثناء الحفظ</div>`;
    }
  };
}

      <div class="sub">متأكد إنك عايز تحذف <b>${emp.name}</b>؟ سجل حضوره القديم هيفضل موجود، بس مش هيقدر يدخل تاني.</div>
      <div class="modal-actions">
        <button class="secondary-btn" id="rm-cancel">إلغاء</button>
        <button class="primary-btn" id="rm-confirm" style="background:var(--danger);">حذف نهائيًا</button>
      </div>
    </div>
  `;
  document.body.appendChild(backdrop);
  backdrop.querySelector('#rm-cancel').onclick = () => backdrop.remove();
  backdrop.querySelector('#rm-confirm').onclick = () => {
    backdrop.remove();
    pendingDeleteIds.add(empId);
    route();
    const timeoutId = setTimeout(async () => {
      pendingDeleteIds.delete(empId);
      try{
        await usersCol.doc(empId).delete();
        logAction('حذف موظف', emp.name);
      }catch(e){ showToast('حصلت مشكلة أثناء الحذف', true); }
    }, 6000);
    showUndoToast(`تم حذف ${emp.name}`, () => {
      clearTimeout(timeoutId);
      pendingDeleteIds.delete(empId);
      route();
    });
  };
}

function openEditEmployeeModal(empId){

  backdrop.className = 'modal-backdrop';
  backdrop.innerHTML = `
    <div class="modal" style="text-align:right;">
      <h3 style="text-align:center;">بيانات الموظف</h3>
      <div class="sub" style="text-align:center;">${emp.name}</div>

        ${WEEKDAYS_AR.map(d => {
          const entry = (emp.customSchedule && emp.customSchedule[d.v]) || null;

          const en = entry && entry.end ? entry.end : (emp.endTime || settings.defaultEndTime || '17:00');
          return `
          <div style="display:flex; align-items:center; gap:8px; margin-bottom:8px; flex-wrap:wrap;">
            <span style="width:64px; font-size:12.5px;">${d.l}</span>
            <label style="display:flex; align-items:center; gap:4px; font-size:12px;">
              <input type="checkbox" class="flex-off" data-day="${d.v}" ${isOff ? 'checked' : ''}> إجازة
            </label>
            <input type="time" class="flex-start" data-day="${d.v}" value="${st}" style="width:110px; padding:6px 8px; border-radius:7px; border:1.5px solid var(--panel-line);" ${isOff ? 'disabled' : ''}>

          <option value="">بدون قسم</option>

      </div>
      <div class="field">
        <label for="es-branch">الفرع (لو موقع الحضور مقيّد)</label>
        <select id="es-branch">
          <option value="">أي فرع من فروع الشركة</option>
          ${branches.map(b => `<option value="${b.id}" ${emp.branchId === b.id ? 'selected' : ''}>${b.name}</option>`).join('')}
        </select>
      </div>
      <div class="modal-actions">
        <button class="secondary-btn" id="es-cancel">إلغاء</button>
        <button class="primary-btn" id="es-save">حفظ</button>
      </div>
    </div>
  `;
  document.body.appendChild(backdrop);
  const updateHoursHint = () => {
    const sVal = document.getElementById('es-time').value;
    const eVal = document.getElementById('es-end').value;
    const hint = document.getElementById('es-hours-hint');
    if(!sVal || !eVal){ hint.textContent = ''; return; }
    const [sh,sm] = sVal.split(':').map(Number);
    const [eh,em] = eVal.split(':').map(Number);
    let mins = (eh*60+em) - (sh*60+sm);
    if(mins < 0) mins += 24*60;
    hint.textContent = `عدد ساعات العمل الرسمية: ${fmtMinutes(mins)}`;
  };
  document.getElementById('es-time').oninput = updateHoursHint;
  document.getElementById('es-end').oninput = updateHoursHint;
  updateHoursHint();

  document.getElementById('es-flex-toggle').onchange = (e) => {
    document.getElementById('es-flex-days').style.display = e.target.checked ? 'block' : 'none';
  };
  backdrop.querySelectorAll('.flex-off').forEach(cb => {
    cb.onchange = () => {
      const day = cb.getAttribute('data-day');
      backdrop.querySelector(`.flex-start[data-day="${day}"]`).disabled = cb.checked;
      backdrop.querySelector(`.flex-end[data-day="${day}"]`).disabled = cb.checked;
    };
  });

  backdrop.querySelector('#es-cancel').onclick = () => backdrop.remove();
  backdrop.querySelector('#es-save').onclick = async () => {
    if(!debounceSubmit()) return;
    const newTime = document.getElementById('es-time').value;
    const newEnd = document.getElementById('es-end').value;
    const newDept = document.getElementById('es-dept').value;
    const newBranch = document.getElementById('es-branch').value;
    const jobTitle = document.getElementById('es-title').value.trim();
    const phone = document.getElementById('es-phone').value.trim();
    const hireDate = document.getElementById('es-hire').value;
    const dateOfBirth = document.getElementById('es-dob').value;
    const baseSalary = Number(document.getElementById('es-salary').value) || 0;
    if(!newTime || !newEnd){ document.getElementById('es-error').innerHTML = `<div class="error-msg">اختار مواعيد صحيحة</div>`; return; }
    const useFlex = document.getElementById('es-flex-toggle').checked;
    let customSchedule = null;
    if(useFlex){
      customSchedule = {};
      WEEKDAYS_AR.forEach(d => {
        const off = backdrop.querySelector(`.flex-off[data-day="${d.v}"]`).checked;
        const start = backdrop.querySelector(`.flex-start[data-day="${d.v}"]`).value;
        const end = backdrop.querySelector(`.flex-end[data-day="${d.v}"]`).value;
        customSchedule[d.v] = off ? { off:true } : { start, end };
      });
    }
    try{
      const updateData = { startTime: newTime, endTime: newEnd, departmentId: newDept, branchId: newBranch, jobTitle, phone, hireDate, dateOfBirth, baseSalary };
      updateData.customSchedule = useFlex ? customSchedule : firebase.firestore.FieldValue.delete();
      await usersCol.doc(empId).update(updateData);
      backdrop.remove();
      showToast(`تم تحديث بيانات ${emp.name}`);
      logAction('تعديل بيانات موظف', `${emp.name} — من ${newTime} إلى ${newEnd}`);
    }catch(e){
      backdrop.remove();
      showToast('حصلت مشكلة أثناء الحفظ', true);
    }
  };
}

  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  const todayStr = new Date().toISOString().slice(0,10);
  backdrop.innerHTML = `
    <div class="modal" style="text-align:right;">
      <h3 style="text-align:center;">تسجيل حضور/انصراف يدوي</h3>
      <div class="sub" style="text-align:center;">لو موظف نسي يسجل، تقدر تضيف تسجيل ليوم واحد أو لعدة أيام مرة واحدة</div>
      <div id="me-error"></div>
      <div class="field">
        <label for="me-emp">الموظف</label>
        <select id="me-emp">
          ${employees.map(e => `<option value="${e.id}">${e.name}</option>`).join('')}
        </select>
      </div>
      <div class="field">
        <label for="me-type">النوع</label>
        <select id="me-type">
          <option value="in">حضور</option>
          <option value="out">انصراف</option>
        </select>
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
        <div class="field"><label for="me-date-from">من يوم</label><input id="me-date-from" type="date" value="${todayStr}"></div>
        <div class="field"><label for="me-date-to">لغاية يوم</label><input id="me-date-to" type="date" value="${todayStr}"></div>
      </div>
      <div class="field"><label for="me-time">الوقت (نفسه لكل الأيام)</label><input id="me-time" type="time" value="09:00"></div>
      <label style="display:flex; align-items:center; gap:8px; font-size:13px; background:#fff; padding:10px 14px; border-radius:8px; border:1.5px solid var(--panel-line); margin-bottom:16px;">
        <input type="checkbox" id="me-workdays-only" checked>
        سجّل في أيام الشغل الرسمية بس (استبعد الإجازات وأيام العطلة)
      </label>
      <div id="me-preview" class="sub" style="margin-bottom:10px;"></div>
      <div class="modal-actions">
        <button class="secondary-btn" id="me-cancel">إلغاء</button>
        <button class="primary-btn" id="me-save">حفظ التسجيلات</button>
      </div>
    </div>
  `;
  document.body.appendChild(backdrop);

  const updatePreview = () => {
    const fromVal = document.getElementById('me-date-from').value;
    const toVal = document.getElementById('me-date-to').value;
    const workOnly = document.getElementById('me-workdays-only').checked && fromVal !== toVal;
    const preview = document.getElementById('me-preview');
    if(!fromVal || !toVal || toVal < fromVal){ preview.textContent = ''; return; }
    const dates = getDateRange(fromVal, toVal, workOnly);
    preview.textContent = `هيتم إضافة ${dates.length} تسجيل${dates.length === 1 ? '' : 'ات'}.`;
  };
  document.getElementById('me-date-from').onchange = updatePreview;
  document.getElementById('me-date-to').onchange = updatePreview;
  document.getElementById('me-workdays-only').onchange = updatePreview;
  updatePreview();

  backdrop.querySelector('#me-cancel').onclick = () => backdrop.remove();
  backdrop.querySelector('#me-save').onclick = async () => {
    if(!debounceSubmit()) return;
    const empId = document.getElementById('me-emp').value;
    const type = document.getElementById('me-type').value;
    const fromVal = document.getElementById('me-date-from').value;
    const toVal = document.getElementById('me-date-to').value;
    const timeVal = document.getElementById('me-time').value;
    const workOnly = document.getElementById('me-workdays-only').checked && fromVal !== toVal;
    const errBox = document.getElementById('me-error');
    if(!empId || !fromVal || !toVal || !timeVal){ errBox.innerHTML = `<div class="error-msg">من فضلك املأ كل الحقول</div>`; return; }
    if(toVal < fromVal){ errBox.innerHTML = `<div class="error-msg">تاريخ النهاية لازم يكون بعد تاريخ البداية</div>`; return; }
    const dates = getDateRange(fromVal, toVal, workOnly);
    if(dates.length === 0){ errBox.innerHTML = `<div class="error-msg">مفيش أيام شغل في المدى ده. جرب تشيل علامة "أيام الشغل بس" لو عايز تسجل في يوم عطلة</div>`; return; }
    if(dates.length > 300){ errBox.innerHTML = `<div class="error-msg">المدى كبير أوي (${dates.length} يوم). قسّمه لفترات أصغر من فضلك</div>`; return; }
    const emp = users.find(u => u.id === empId);
    const [hh,mm] = timeVal.split(':').map(Number);
    try{
      const batch = db.batch();
      dates.forEach(date => {
        const ts = new Date(date.getFullYear(), date.getMonth(), date.getDate(), hh, mm).getTime();
        const ref = attendanceCol.doc();
        batch.set(ref, { userId: empId, name: emp.name, username: emp.username, type, ts, lat: null, lng: null, manual: true, enteredBy: currentUser.name });
      });
      await batch.commit();
      backdrop.remove();
      showToast(`تم تسجيل ${dates.length} ${type === 'in' ? 'حضور' : 'انصراف'} لـ${emp.name} يدويًا`);
      logAction('تسجيل يدوي متعدد الأيام', `${emp.name} — ${type === 'in' ? 'حضور' : 'انصراف'} — من ${fromVal} إلى ${toVal} (${dates.length} يوم)`);
    }catch(e){
      errBox.innerHTML = `<div class="error-msg">حصلت مشكلة أثناء الحفظ: ${(e && e.message) ? e.message : 'خطأ غير معروف'}</div>`;
    }
  };
}

  const statusClass = { pending:'out', approved:'in', rejected:'out' };
  box.innerHTML = `

            <td><span class="type-tag ${statusClass[l.status]}">${statusLabel[l.status]}</span></td>
            <td style="white-space:nowrap;">
              ${isManager && l.status === 'pending' ? `
                <button class="secondary-btn" style="padding:6px 10px; font-size:12px; width:auto;" data-approve="${l.id}">موافقة</button>

              ` : ''}
              ${isManager || canCancelOwn ? `
                <button class="secondary-btn" style="padding:6px 10px; font-size:12px; width:auto; color:var(--danger); border-color:rgba(196,69,59,0.4) !important;" data-del-leave="${l.id}">حذف</button>
              ` : ''}
            </td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  `;
  box.querySelectorAll('[data-del-leave]').forEach(btn => {
    btn.onclick = () => deleteLeave(btn.getAttribute('data-del-leave'), isManager);
  });
  if(isManager){
    box.querySelectorAll('[data-approve]').forEach(btn => {
      btn.onclick = () => decideLeave(btn.getAttribute('data-approve'), 'approved');
    });
    box.querySelectorAll('[data-reject]').forEach(btn => {
      btn.onclick = () => decideLeave(btn.getAttribute('data-reject'), 'rejected');
    });
  }
}
async function decideLeave(leaveId, status){
  const l = leaveRequests.find(x => x.id === leaveId);
  try{
    await leaveCol.doc(leaveId).update({ status });
    showToast(status === 'approved' ? 'تمت الموافقة على الإجازة' : 'تم رفض الإجازة');
    if(l) logAction(status === 'approved' ? 'موافقة على إجازة' : 'رفض إجازة', `${l.name} (${l.fromDate} - ${l.toDate})`);
  }catch(e){
    showToast('حصلت مشكلة أثناء التحديث', true);
  }
}
async function deleteLeave(leaveId, isManager){
  const l = leaveRequests.find(x => x.id === leaveId);
  try{
    await leaveCol.doc(leaveId).delete();
    showToast('تم حذف طلب الإجازة');
    if(isManager && l) logAction('حذف طلب إجازة', `${l.name} (${l.fromDate} - ${l.toDate})`);
  }catch(e){
    showToast('حصلت مشكلة أثناء الحذف', true);
  }
}
function openLeaveRequestModal(){
  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.innerHTML = `
    <div class="modal" style="text-align:right;">
      <h3 style="text-align:center;">طلب إجازة جديدة</h3>
      <div id="lv-error"></div>
      <div class="field">
        <label for="lv-type">نوع الإجازة</label>
        <select id="lv-type">
          <option value="سنوية">سنوية</option>
          <option value="مرضية">مرضية</option>
          <option value="عارضة">عارضة</option>
        </select>
      </div>
      <div class="field"><label for="lv-from">من يوم</label><input id="lv-from" type="date"></div>
      <div class="field"><label for="lv-to">لغاية يوم</label><input id="lv-to" type="date"></div>
      <div class="field"><label for="lv-reason">السبب (اختياري)</label><input id="lv-reason" type="text" placeholder="سبب الإجازة"></div>
      <div class="modal-actions">
        <button class="secondary-btn" id="lv-cancel">إلغاء</button>
        <button class="primary-btn" id="lv-save">إرسال الطلب</button>
      </div>
    </div>
  `;
  document.body.appendChild(backdrop);
  backdrop.querySelector('#lv-cancel').onclick = () => backdrop.remove();
  backdrop.querySelector('#lv-save').onclick = async () => {
    if(!debounceSubmit()) return;
    const type = document.getElementById('lv-type').value;
    const fromDate = document.getElementById('lv-from').value;
    const toDate = document.getElementById('lv-to').value;
    const reason = document.getElementById('lv-reason').value.trim();
    const errBox = document.getElementById('lv-error');
    if(!fromDate || !toDate){ errBox.innerHTML = `<div class="error-msg">اختار تاريخ البداية والنهاية</div>`; return; }
    if(toDate < fromDate){ errBox.innerHTML = `<div class="error-msg">تاريخ النهاية لازم يكون بعد تاريخ البداية</div>`; return; }
    try{
      await leaveCol.add({ userId: currentUser.id, name: currentUser.name, type, fromDate, toDate, reason, status:'pending', requestedAt: Date.now() });
      backdrop.remove();
      showToast('تم إرسال طلب الإجازة');
    }catch(e){
      errBox.innerHTML = `<div class="error-msg">حصلت مشكلة أثناء الإرسال</div>`;
    }
  };
}
